    <h1>【树洞】失去一个人是什么感觉</h1>
    <div class="meta">用户: <b>匿名</b> · 2026-11-07 · 回复 16</div>
    <div class="content">
        <p>我失去了一个人。不是那种"分手了"的失去，是真的再也见不到了。</p>
        <p>我不知道该怎么形容那种感觉。世界还在转，但你已经不在这个世界里了。</p>
        <p>关键词：<span class="kw">失去</span>、<span class="kw">哥哥</span></p>
    </div>
    <div class="reply"><div class="name">过来人</div><div class="text">我理解你。我失去过家人。那种感觉就像是——你能看到所有人都在往前走，但你停在原地。</div></div>
    <div class="reply"><div class="name">南城老居民</div><div class="text">是兄弟吗？你提到了"哥哥"。我认识一个人，他也失去了他的弟弟。他现在整个人都变了。</div></div>
    <div class="reply"><div class="name">匿名</div><div class="text">是兄弟。他是我这辈子最重要的人。他不在了之后，我不知道该怎么活。</div></div>
