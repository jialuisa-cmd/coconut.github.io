    <div class="reply"><div class="name">匿名</div><div class="text">我知道那个人。他叫<span class="kw">李慈安</span>。他以前在实验小学上学，后来转到了南城一中。他身体一直不好，性格也很内向。听说他走了之后，他哥就疯了。</div></div>
