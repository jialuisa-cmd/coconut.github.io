    <h1>【求助】被霸凌应该怎么反击</h1>
    <div class="meta">用户: <b>高中生</b> · 2026-11-12 · 回复 24</div>
    <div class="content">
        <p>我在学校被几个人一直欺负。告诉老师没用，老师只会说"他们闹着玩的"。</p>
        <p>我不想忍了。我想反击。有没有什么办法？</p>

    <div class="reply"><div class="name">过来人</div><div class="text">你反击的话，他们只会打得更狠。我当时试过。最好的办法是转学或者换环境。</div></div>
    <div class="reply"><div class="name">匿名</div><div class="text">如果你真的想反击，别用打架的方式。收集证据，报警，去教育局投诉。法律比拳头有用。</div></div>
    <div class="reply"><div class="name">南城老居民</div><div class="text">我记得之前南城一中有个学生被霸凌得很严重，后来那个人好像也没了。这种事真的会出人命的。</div></div>
