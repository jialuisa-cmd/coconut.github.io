    <h1>【树洞】最近总是失眠，有人一样吗？</h1>

    <div class="content">
        <p>我已经连续好几个晚上睡不着了。</p>
        <p>闭上眼睛就会听到一些声音……像是在叫我，又不像。</p>
        <p>有时候我会觉得自己不是一个人。房间里好像还有别人。</p>
        <p>但我转过头去，什么也没有。</p>
        <p>—— 一个失眠的人</p>
    </div>
    <div class="reply">
        <div class="name">助眠大师</div>
        <div class="text">睡前喝点热牛奶，听听轻音乐，放松一下。</div>
    </div>
    <div class="reply">
        <div class="name">普通市民</div>
        <div class="text">你是不是压力太大了？最近南城不太平，大家都人心惶惶的。</div>
    </div>
    <div class="reply">

    </div>
