    // ===== 渲染函数 =====
    function renderResults(keyword) {
        var container = document.getElementById('resultsContainer');
        var keywordDisplay = document.getElementById('keywordDisplay');
        keywordDisplay.textContent = '"' + keyword + '"';

        var results = searchData[keyword];
        if (!results) {
            // 模糊匹配
            var matched = false;
            for (var key in searchData) {
                if (keyword.includes(key)) { results = searchData[key]; matched = true; break; }
                if (key.includes(keyword)) { results = searchData[key]; matched = true; break; }
            }
            if (!matched) results = [];
        }

        if (!results || results.length === 0) {
            container.innerHTML = `
                <div class="no-result">🔍 未找到与 "<span style="color:#8a2a2a;">${keyword}</span>" 相关的内容</div>

                        <span class="tag" onclick="location.href='search.html?q=生日'">生日</span>
                    </div>
                </div>
            `;
            return;

        var html = '';

                    <div class="snippet">${item.snippet}</div>
                    <div class="meta">来自：南城社区 · <span class="highlight">${keyword}</span> 相关</div>

            `;
        });
