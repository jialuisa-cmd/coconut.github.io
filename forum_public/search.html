<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索结果 · 南城社区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e8ecf0; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #fff; padding: 30px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .back { margin-bottom: 20px; }
        .back a { color: #1a5a8a; text-decoration: none; font-size: 14px; }
        .back a:hover { text-decoration: underline; }
        .result-title { font-size: 20px; color: #1a2a3a; border-bottom: 2px solid #1a3a5c; padding-bottom: 12px; margin-bottom: 20px; }
        .result-title .keyword { color: #8a2a2a; }
        .result-item { padding: 14px 0; border-bottom: 1px solid #f0f2f5; }
        .result-item .title { font-size: 15px; color: #1a5a8a; cursor: pointer; }
        .result-item .title:hover { text-decoration: underline; }
        .result-item .snippet { font-size: 13px; color: #666; margin-top: 4px; }
        .result-item .meta { font-size: 12px; color: #999; margin-top: 4px; }
        .result-item .meta .highlight { color: #8a2a2a; font-weight: bold; }
        .no-result { color: #999; font-size: 15px; text-align: center; padding: 40px 0; }
        .suggestion { color: #888; font-size: 13px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <div class="back"><a href="index.html">← 返回首页</a></div>

    <div class="result-title">
        搜索结果：<span class="keyword" id="keywordDisplay">"加载中..."</span>
    </div>

    <div id="resultsContainer">
        <!-- 由 JavaScript 动态渲染 -->
    </div>

    <div class="suggestion">
        💡 提示：试试搜索 "李慈安"、"哥哥"、"玄姬"
    </div>
</div>

<script>
    // ===== 预设数据 =====
    var searchData = {
        '李慈安': [
            { title: '【求助】有谁知道南城一中的事吗？', url: 'posts/1.html', snippet: '李慈安这个名字你们听说过吗？我好像在哪儿见过……' },
            { title: '【树洞】最近总是失眠，有人一样吗？', url: 'posts/2.html', snippet: '我叫李慈安，最近总是睡不着，脑子里一直有声音。' },
            { title: '【日常】今天看到一个很奇怪的符号', url: 'posts/3.html', snippet: '有人认识这个符号吗？我总觉得它和一个人有关……' },
            { title: '【求助】有人能帮我吗？我快撑不下去了', url: 'posts/4.html', snippet: '我是李慈安。我快撑不下去了。有人能帮我吗？' },
            { title: '【求助】被欺负了该怎么办？', url: 'posts/5.html', snippet: '李慈安：他们又来了……我真的不知道该怎么办。' },
            { title: '【求助】我哥最近变得很奇怪……', url: 'posts/6.html', snippet: '我是李慈安。我哥最近变得很奇怪，他说他听到了什么。' },
            { title: '【树洞】他是我哥，但我不知道他是谁', url: 'posts/7.html', snippet: '李慈安：他是我哥，但我不知道他到底是谁……' },
            { title: '【日常】今天爸又喝酒了，哥让我躲起来', url: 'posts/8.html', snippet: '李慈安：爸又喝酒了，哥让我躲起来。他说会好的。' }
        ],
        '哥哥': [
            { title: '【求助】我哥最近变得很奇怪……', url: 'posts/6.html', snippet: '我是李慈安。我哥最近变得很奇怪，他说他听到了什么。' },
            { title: '【树洞】他是我哥，但我不知道他是谁', url: 'posts/7.html', snippet: '李慈安：他是我哥，但我不知道他到底是谁……' },
            { title: '【日常】今天爸又喝酒了，哥让我躲起来', url: 'posts/8.html', snippet: '李慈安：爸又喝酒了，哥让我躲起来。他说会好的。' }
        ],
        '玄姬': [
            { title: '【日常】今天看到一个很奇怪的符号', url: 'posts/3.html', snippet: '有人认识这个符号吗？我总觉得它和一个人有关——那个人好像叫"玄姬"……' }
        ]
    };

    // 默认空结果
    var defaultResult = {
        title: '未找到相关结果',
        snippet: '试试搜索 "李慈安"、"哥哥"、"玄姬"'
    };

    // ===== 渲染 =====
    function renderResults(keyword) {
        var container = document.getElementById('resultsContainer');
        var keywordDisplay = document.getElementById('keywordDisplay');
        keywordDisplay.textContent = '"' + keyword + '"';

        var results = searchData[keyword];
        if (!results) {
            // 模糊匹配：如果关键词包含某个预设词，也显示
            var matched = false;
            for (var key in searchData) {
                if (keyword.includes(key)) {
                    results = searchData[key];
                    matched = true;
                    break;
                }
                if (key.includes(keyword)) {
                    results = searchData[key];
                    matched = true;
                    break;
                }
            }
            if (!matched) {
                results = [];
            }
        }

        if (!results || results.length === 0) {
            container.innerHTML = `
                <div class="no-result">🔍 未找到与 "<span style="color:#8a2a2a;">${keyword}</span>" 相关的内容</div>
                <div style="text-align:center; font-size:13px; color:#888; margin-top:10px;">
                    建议搜索：<span style="color:#1a5a8a;cursor:pointer;" onclick="location.href='search.html?q=李慈安'">李慈安</span> · 
                    <span style="color:#1a5a8a;cursor:pointer;" onclick="location.href='search.html?q=哥哥'">哥哥</span> · 
                    <span style="color:#1a5a8a;cursor:pointer;" onclick="location.href='search.html?q=玄姬'">玄姬</span>
                </div>
            `;
            return;
        }

        var html = '';
        results.forEach(function(item) {
            html += `
                <div class="result-item">
                    <div class="title" onclick="location.href='${item.url}'">📄 ${item.title}</div>
                    <div class="snippet">${item.snippet}</div>
                    <div class="meta">来自：南城社区 · <span class="highlight">${keyword}</span> 相关</div>
                </div>
            `;
        });

        container.innerHTML = html + `<div style="margin-top:16px; color:#999; font-size:12px;">共 ${results.length} 条结果</div>`;
    }

    // ===== 从URL获取关键词 =====
    var params = new URLSearchParams(window.location.search);
    var keyword = params.get('q');
    if (!keyword) {
        keyword = '请输入搜索词';
        document.getElementById('keywordDisplay').textContent = '"请搜索"';
        document.getElementById('resultsContainer').innerHTML = `
            <div class="no-result">🔍 请输入搜索关键词</div>
            <div style="text-align:center; font-size:13px; color:#888; margin-top:10px;">
                建议搜索：<span style="color:#1a5a8a;cursor:pointer;" onclick="location.href='search.html?q=李慈安'">李慈安</span> · 
                <span style="color:#1a5a8a;cursor:pointer;" onclick="location.href='search.html?q=哥哥'">哥哥</span> · 
                <span style="color:#1a5a8a;cursor:pointer;" onclick="location.href='search.html?q=玄姬'">玄姬</span>
            </div>
        `;
    } else {
        renderResults(decodeURIComponent(keyword));
    }

    console.log('🔍 搜索页面已加载，当前关键词:', keyword);
</script>
</body>
</html>
