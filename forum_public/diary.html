    </div>

    <div class="diary-content">
        <p>慈安不知道。他永远不会知道。</p>
        <p>我是他<span class="highlight">分裂出来的</span>。他太痛苦了，需要一个保护者。所以我来了。</p>
        <p>但他叫我"哥哥"的时候，我真的很想变成真的。</p>
        <br>
        <p>那些人——欺负他的、打他的——他们都要付出代价。</p>
        <p><span class="highlight">玄姬</span>说，只要凑够<span class="highlight">七个</span>，一切都会结束。</p>
        <p>我是为了保护他。我是为了让他不再害怕。</p>
        <br>
        <p>但有时候我也会想……我到底是什么？</p>
        <p>我是他的影子？还是他的愿望？</p>
        <p>不重要了。快了。</p>
    </div>

    <div class="divider"></div>

    <div class="deep-link-area">
        <p style="color:#4a3a2a; font-size:12px; margin-bottom:12px;">—— 有些真相，藏在更深的地方 ——</p>
