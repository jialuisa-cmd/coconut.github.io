<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>登录 · 深网档案</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0d0a08;
            color: #b8a8a0;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            border: 1px solid #2a1a12;
            padding: 40px 35px;
            background: #120e0c;
            width: 420px;
            max-width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .box h2 {
            color: #6a3a2a;
            font-weight: normal;
            letter-spacing: 4px;
            font-size: 18px;
            border-bottom: 1px solid #2a1a12;
            padding-bottom: 15px;
            margin-bottom: 18px;
        }
        .box .sub {
            color: #4a3a2a;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .box label {
            display: block;
            text-align: left;
            font-size: 11px;
            color: #5a4a3a;
            margin: 12px 0 4px 0;
        }
        .box input {
            display: block;
            width: 100%;
            background: #0a0806;
            border: 1px solid #2a1a12;
            padding: 12px 14px;
            margin: 4px 0 6px 0;
            color: #d0c8c0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
        }
        .box input:focus {
            border-color: #5a3a2a;
        }
        .box button {
            background: #1a120e;
            border: 1px solid #2a1a12;
            color: #b8a8a0;
            padding: 12px;
            width: 100%;
            margin-top: 18px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            letter-spacing: 3px;
            transition: all 0.3s;
        }
        .box button:hover {
            background: #2a1a12;
            color: #e8d8d0;
            border-color: #4a3a2a;
        }
        .box button:active {
            transform: scale(0.97);
        }
        #feedback {
            margin-top: 14px;
            font-size: 12px;
            min-height: 22px;
            color: #6a3a2a;
        }
        .hint {
            color: #3a2a1a;
            font-size: 11px;
            margin-top: 20px;
            border-top: 1px solid #1a120e;
            padding-top: 16px;
            line-height: 1.7;
            text-align: left;
        }
        .hint strong {
            color: #5a4a3a;
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .success {
            color: #3a7a3a !important;
        }
    </style>
</head>
<body>

<div class="box" id="loginBox">
    <h2>■ 深网档案 · 身份验证</h2>
    <div class="sub">请输入凭证以解锁加密内容</div>

    <label for="username">代号（任意填写）</label>
    <input type="text" id="username" placeholder="例如：调查者" value="">

    <label for="password">密码</label>
    <input type="password" id="password" placeholder="请输入密码" value="">

    <!-- 使用 onclick 直接绑定函数，确保点击立即执行 -->
    <button id="loginBtn" onclick="doLogin()">▸ 验证身份 ◂</button>

    <div id="feedback"></div>

    <div class="hint">
        💡 <strong>提示：</strong><br>
        · 用户名随意填写，它会成为你的代号<br>
        · 密码藏在五个帖子里，拼起来是 <strong>3 个字符</strong><br>
        · 试试搜索“符号”、“梦”、“记录”找线索
    </div>
</div>

<script>
    // ----- 全局函数，供 onclick 调用 -----
    function doLogin() {
        // 获取输入值
        var u = document.getElementById('username').value.trim();
        var p = document.getElementById('password').value.trim();
        var feedback = document.getElementById('feedback');
        var box = document.getElementById('loginBox');

        // 清空旧反馈
        feedback.textContent = '';
        feedback.className = '';

        // 校验用户名
        if (u === '') {
            feedback.textContent = '❌ 请输入你的代号';
            feedback.style.color = '#8a3a2a';
            box.classList.add('shake');
            setTimeout(function() { box.classList.remove('shake'); }, 400);
            return;
        }

        // 校验密码
        if (p === '') {
            feedback.textContent = '❌ 请输入密码';
            feedback.style.color = '#8a3a2a';
            box.classList.add('shake');
            setTimeout(function() { box.classList.remove('shake'); }, 400);
            return;
        }

        // 验证密码（正确：XJ7，不区分大小写）
        if (p.toUpperCase() === 'XJ7') {
            // 存储用户名
            localStorage.setItem('argPlayerName', u);
            feedback.textContent = '✅ 验证通过。欢迎回来，' + u + '。';
            feedback.style.color = '#3a7a3a';
            feedback.className = 'success';

            // 禁用按钮
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').textContent = '⏳ 跳转中...';

            // 跳转
            setTimeout(function() {
                window.location.href = 'revelation.html';
            }, 1500);
            return;
        }

        // 密码错误
        var upperP = p.toUpperCase();
        if (upperP === 'X' || upperP === 'J' || upperP === '7') {
            feedback.textContent = '❌ 只找到一个字符？继续找，还有两个。';
        } else if (upperP === 'XJ' || upperP === 'JX' || upperP === 'X7' || upperP === '7X' || upperP === 'J7' || upperP === '7J') {
            feedback.textContent = '❌ 还差一个。想想数字几？顺序对吗？';
        } else if (upperP.includes('X') || upperP.includes('J')) {
            feedback.textContent = '❌ 顺序不对，或者缺了数字。重新拼一下。';
        } else if (p.includes('玄') || p.includes('姬')) {
            feedback.textContent = '❌ 密码只接受英文字母和数字。试试用拼音。';
        } else {
            feedback.textContent = '❌ 密码错误。去帖子列表里找找线索。';
        }
        feedback.style.color = '#8a2a1a';

        // 晃动反馈
        box.classList.add('shake');
        setTimeout(function() { box.classList.remove('shake'); }, 400);

        // 清空密码框
        document.getElementById('password').value = '';
        document.getElementById('password').focus();

        // 控制台输出，帮助调试
        console.log('❌ 登录失败，尝试次数:', window.attempts ? window.attempts.length : 0);
    }

    // 辅助：记录尝试次数（可选）
    window.attempts = window.attempts || [];

    // 按回车键触发登录
    document.addEventListener('DOMContentLoaded', function() {
        var username = document.getElementById('username');
        var password = document.getElementById('password');

        // 用户名框按回车跳密码框
        username.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                password.focus();
            }
        });

        // 密码框按回车触发登录
        password.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doLogin();
            }
        });

        // 自动填充已保存的用户名
        var saved = localStorage.getItem('argPlayerName');
        if (saved) {
            username.value = saved;
            password.focus();
        }

        console.log('✅ 登录页面已加载，点击按钮或按回车即可登录。');
        console.log('💡 提示：密码是 XJ7（大写）');
    });
</script>

</body>
</html>
