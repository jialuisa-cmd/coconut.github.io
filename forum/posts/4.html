<div class="container">
    <h1>【加密】有人一直在跟着我</h1>
    <div class="meta">用户: <b style="color:#6a3a2a;">匿名</b> · 2026.06.28 · 最后编辑: 2026.07.01</div>
    <div class="content">
        <p>我不知道该跟谁说。</p>
        <p>从六月中旬开始，我总觉得有人在看我。</p>
        <p>不是那种"被人盯着"的感觉——是真的有影子。</p>
        <p>我在窗户上看到过一个模糊的轮廓，但转过去就没了。</p>
        <p>我的日记本上出现了一行不是我的字：<span class="red">「你还剩七天。」</span></p>
        <br>
        <p>我去查了监控。什么都没有。</p>
        <p>但我知道——有人在跟着我。</p>
        <p>而且他<span class="highlight">知道我的名字</span>。</p>
        <br>
        <p style="color:#4a3a2a; font-size:12px;">—— 如果你看到了这个帖子，你也被盯上了吗？</p>
        <br>
        <p style="color:#2a1a12; font-size:10px; text-align:right;">· 他就在你身后 ·</p>
    </div>
