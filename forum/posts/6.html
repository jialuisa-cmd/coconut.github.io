    <h1>【加密】我还剩几天？</h1>
    <div class="meta">用户: <b style="color:#6a3a2a;">匿名</b> · 2026.07.03</div>
    <div class="content">
        <p>我今天又收到一张纸条。</p>
        <p>上面写着：<span class="red">「七天后，南城渡口。你一个人来。」</span></p>
        <p>我不知道是谁放的。但我知道这不是玩笑。</p>
        <p>因为我的手机里多了一张照片——是我今天早上的自拍，但我从没拍过。</p>
        <p>有人在我不知道的时候，用我的手机拍了照。</p>
        <br>
        <p>我去查了南城渡口是什么地方。</p>
        <p>那是一个废弃的河边渡口。本地人都说那里不干净。</p>
        <p>据说几百年前，有两个女孩在那里被沉了河。</p>
        <br>
        <p style="color:#4a3a2a; font-size:12px;">—— 我该去吗？还是说……我已经没有选择了？</p>
        <div class="countdown"><span class="red">7</span> : <span class="red">0</span> : <span class="red">0</span></div>
        <p style="color:#2a1a12; font-size:10px; text-align:right;">· 你在名单上 ·</p>
