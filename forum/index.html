<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>深网档案 · 加密论坛</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0d0a08; color: #b8a8a0; font-family: 'Courier New', monospace; padding: 30px; }
        .container { max-width: 900px; margin: auto; border: 1px solid #2a1a12; padding: 20px; background: #120e0c; }
        .header { border-bottom: 1px solid #2a1a12; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #6a3a2a; font-size: 20px; letter-spacing: 4px; }
        .header .status { color: #3a5a3a; font-size: 12px; }
        .nav { display: flex; gap: 20px; margin: 15px 0; font-size: 13px; }
        .nav a { color: #7a6a5a; text-decoration: none; }
        .nav a:hover { color: #9a8a7a; }
        .search-bar { display: flex; gap: 10px; margin: 15px 0; }
        .search-bar input { flex: 1; background: #0a0806; border: 1px solid #2a1a12; padding: 8px; color: #b8a8a0; }
        .search-bar button { background: #1a120e; border: 1px solid #2a1a12; color: #7a6a5a; padding: 8px 20px; cursor: pointer; }
        .search-bar button:hover { background: #2a1a12; color: #b8a8a0; }
        .thread { border-bottom: 1px solid #1a120e; padding: 12px 0; display: flex; justify-content: space-between; cursor: pointer; }
        .thread:hover { background: #1a1410; }
        .thread .title { color: #8a7a6a; }
        .thread .title .locked { color: #5a2a1a; margin-right: 8px; }
        .thread .meta { font-size: 11px; color: #4a3a2a; }
        .thread .meta .highlight { color: #7a3a2a; }
        .footer { margin-top: 20px; border-top: 1px solid #1a120e; padding-top: 12px; font-size: 11px; color: #2a221a; text-align: center; }
        .login-banner { background: #1a0e0a; border: 1px solid #3a1a0a; padding: 10px; text-align: center; margin-bottom: 15px; }
        .login-banner a { color: #7a4a2a; text-decoration: none; }
        .hidden-symbol { color: #120e0c; font-size: 6px; user-select: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>■ 深网档案 · 加密节点</h1>
        <span class="status">● 已连接 (匿名)</span>
    </div>
    <div class="login-banner">
        ⚠️ 您正在以 <span style="color:#3a5a3a;">访客</span> 身份浏览。 <a href=" ">登录</a > 以解锁更多档案。
    </div>
    <div class="nav">
        <a href="index.html">◈ 全部帖子</a >
        <a href="#">◈ 案件真相</a >
        <a href="#">◈ 玄姬研究</a >
        <a href="#">◈ 失踪人口</a >
    </div>
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="搜索加密档案..." onkeydown="if(event.key=='Enter') doSearch()">
        <button onclick="doSearch()">🔍 搜索</button>
    </div>

    <div style="margin-top:10px;">
        <div class="thread" onclick="location.href='posts/1.html'">
            <span class="title">【求助】有人认识这个符号吗？</span>
            <span class="meta">回复: 12 &nbsp;|&nbsp; 2018.11.23</span>
        </div>
        <div class="thread" onclick="location.href='posts/2.html'">
            <span class="title">【讨论】有没有人做过同样的梦？</span>
            <span class="meta">回复: 7 &nbsp;|&nbsp; 2019.03.11</span>
        </div>
        <div class="thread" onclick="location.href='posts/3.html'">
            <span class="title">【记录】一些无法解释的事</span>
            <span class="meta">回复: 5 &nbsp;|&nbsp; 2020.08.22</span>
        </div>
        <div class="thread" onclick="location.href='posts/cian_post.html'">
            <span class="title">【加密】最后的记录 · 李慈安</span>
            <span class="meta">回复: 0 &nbsp;|&nbsp; 2026.07.08</span>
        </div>
        <div class="thread" onclick="window.open('../school/index.html','_blank')">
            <span class="title">【外部链接】南城一中 · 官网</span>
            <span class="meta">来源: 公开网络</span>
        </div>
    </div>

    <div class="footer">※ 本论坛为加密存档 · 所有内容仅限内部查阅 ※</div>
    <div style="text-align:right; font-size:8px; color:#0d0a08; margin-top:4px;">◈</div>
</div>

<script>
    function doSearch() {
        var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!keyword) return;
        var posts = [
            { title: '【求助】有人认识这个符号吗？', url: 'posts/1.html', keywords: '符号 梦 失眠 那个符号', snippet: '那个符号……我见过' },
            { title: '【讨论】有没有人做过同样的梦？', url: 'posts/2.html', keywords: '梦 女人 黑夜 走廊', snippet: '我梦到同一个女人' },
            { title: '【记录】一些无法解释的事', url: 'posts/3.html', keywords: '记录 日记 消失 声音', snippet: '他说他叫……' },
            { title: '【加密】最后的记录 · 李慈安', url: 'posts/cian_post.html', keywords: '慈安 最后 密码 查询码', snippet: '你需要一个查询码' }
        ];
        var results = posts.filter(p => p.keywords.includes(keyword));
        if (results.length > 0) {
            var msg = '🔍 找到 ' + results.length + ' 个相关帖子：\n\n';
            results.forEach(p => { msg += '📄 ' + p.title + '\n   ' + p.snippet + '\n\n'; });
            msg += '点击确定跳转到第一个结果？';
            if (confirm(msg)) window.location.href = results[0].url;
        } else {
            alert('⚠️ 未找到包含 "' + keyword + '" 的帖子。\n提示：试试搜索“符号”或“梦”或“记录”。');
        }
    }
</script>
</body>
</html>
