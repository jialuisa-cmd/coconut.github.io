<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>档案解锁</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            color: #b00;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
        }
        .flash-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            background: rgba(255,0,0,0.15);
            animation: flash 1.5s infinite alternate;
            z-index: 0;
        }
        @keyframes flash {
            0% { opacity: 0.1; }
            100% { opacity: 0.7; }
        }
        .strobe {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            background: rgba(255,0,0,0.25);
            animation: strobe 0.3s infinite;
            z-index: 1;
            opacity: 0.6;
        }
        @keyframes strobe {
            0% { opacity: 0; }
            50% { opacity: 0.9; }
            100% { opacity: 0; }
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 700px;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #600;
            box-shadow: 0 0 50px rgba(255,0,0,0.2);
        }
        .big-text {
            font-size: 64px;
            color: #f00;
            text-shadow: 0 0 40px #f00, 0 0 80px #f00;
            letter-spacing: 8px;
            animation: flicker 2s infinite;
            font-weight: bold;
        }
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.2; }
        }
        .sub-text {
            font-size: 20px;
            color: #800;
            letter-spacing: 4px;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 3s ease;
        }
        .sub-text.show {
            opacity: 1;
        }
        .eye-container {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            pointer-events: none;
            z-index: 1;
        }
        .eye {
            position: absolute;
            font-size: 50px;
            color: #400;
            opacity: 0.3;
            animation: float 8s infinite alternate;
            filter: drop-shadow(0 0 15px #f00);
        }
        .eye:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .eye:nth-child(2) { top: 20%; right: 10%; animation-delay: 1s; }
        .eye:nth-child(3) { bottom: 25%; left: 8%; animation-delay: 2s; }
        .eye:nth-child(4) { bottom: 15%; right: 5%; animation-delay: 3s; }
        .eye:nth-child(5) { top: 45%; left: 50%; transform: translateX(-50%); font-size: 80px; animation-delay: 0.5s; }
        @keyframes float {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(20px,-30px) scale(1.1); }
        }
        .glitch-text {
            color: #400;
            font-size: 12px;
            position: fixed;
            bottom: 10px;
            left: 10px;
            animation: glitch 5s infinite;
            z-index: 2;
        }
        @keyframes glitch {
            0%,90%,100% { opacity: 0.3; }
            92% { opacity: 0; }
            94% { opacity: 0.8; color: #f00; }
            96% { opacity: 0.2; }
        }
        .back-btn {
            margin-top: 20px;
            background: #1a120e;
            border: 1px solid #3a2a1a;
            color: #6a5a4a;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.3s;
            display: inline-block;
            text-decoration: none;
            z-index: 3;
            position: relative;
        }
        .back-btn:hover {
            background: #2a1a12;
            color: #b8a8a0;
            border-color: #5a3a2a;
        }
    </style>
</head>
<body>

    <div class="flash-overlay"></div>
    <div class="strobe"></div>

    <div class="eye-container">
        <div class="eye">👁️</div>
        <div class="eye">👁️</div>
        <div class="eye">👁️</div>
        <div class="eye">👁️</div>
        <div class="eye">👁️</div>
    </div>

    <div class="content" id="mainContent">
        <div class="big-text" id="revealText">第七个就是你</div>
        <div class="sub-text" id="subText">回头</div>
        <div style="margin-top:30px;">
            <a class="back-btn" href="index.html" id="backBtn" style="display:none;">← 返回深网</a>
        </div>
    </div>

    <div class="glitch-text">> 系统日志: 目标已确认 · 献祭程序启动</div>

    <script>
        // 检查是否有用户名，没有则跳回登录
        if (!localStorage.getItem('argPlayerName')) {
            window.location.href = 'login.html';
        }

        // 获取玩家名字（用于后续暗示）
        var playerName = localStorage.getItem('argPlayerName') || '';

        // 阶段1：显示“第七个就是你”，持续3秒
        setTimeout(function() {
            // 阶段2：大字消失
            document.getElementById('revealText').style.transition = 'opacity 1s';
            document.getElementById('revealText').style.opacity = '0';
            // 同时显示“回头”慢慢出现
            setTimeout(function() {
                document.getElementById('subText').classList.add('show');
                // 显示返回按钮
                document.getElementById('backBtn').style.display = 'inline-block';
                // 同时控制台彩蛋
                console.log('%c👁️ 你回头了。', 'color: #6a2a2a; font-size: 18px;');
                console.log('%c但已经晚了。', 'color: #4a2a2a; font-size: 14px;');
            }, 1000);
        }, 3000);

        // 点击任意位置触发一次强闪
        document.body.addEventListener('click', function() {
            var overlay = document.querySelector('.flash-overlay');
            overlay.style.background = 'rgba(255,0,0,0.9)';
            setTimeout(function() {
                overlay.style.background = 'rgba(255,0,0,0.15)';
            }, 300);
        });
    </script>

</body>
</html>
